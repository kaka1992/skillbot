output_dir: results/

tasks:
  - name: math-smoke
    dataset: tests/eval/data/sample.jsonl
    agent: nanobot
    tags: [math]
    concurrency: 2
    # grader: default          # default grader (substring match) — default
    # grader: none             # disable grading
