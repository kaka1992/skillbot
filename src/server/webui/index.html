<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code — Terminal</title>
<style>
/* ============================================================
   NEON NOIR — Claude Code Server WebUI
   ============================================================ */

:root {
  --bg-deep: #0a0e14;
  --bg-panel: #11161e;
  --bg-surface: #181e28;
  --bg-hover: #1e2634;
  --border: #1e2a3a;
  --text-primary: #d4dbe6;
  --text-muted: #5c6e88;
  --accent: #00c8ff;
  --accent-glow: rgba(0,200,255,0.18);
  --accent-dim: #006888;
  --amber: #ffb347;
  --amber-glow: rgba(255,179,71,0.15);
  --red: #ff5370;
  --green: #5af78e;
  --radius: 10px;
  --radius-sm: 6px;
  --font-ui: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
  --font-mono: "JetBrains Mono", "SF Mono", "Cascadia Code", "Fira Code", monospace;
  --transition: 220ms cubic-bezier(0.4, 0, 0.2, 1);
}

* { margin:0; padding:0; box-sizing:border-box; }

html, body { height:100%; overflow:hidden; }

body {
  font-family: var(--font-ui);
  background: var(--bg-deep);
  color: var(--text-primary);
  display: flex;
  -webkit-font-smoothing: antialiased;
  background-image:
    radial-gradient(ellipse 80% 60% at 20% 50%, rgba(0,180,240,0.03) 0%, transparent 70%),
    radial-gradient(ellipse 60% 80% at 80% 20%, rgba(255,179,71,0.02) 0%, transparent 70%);
}

/* ---- scrollbar ---- */
::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:10px; }
::-webkit-scrollbar-thumb:hover { background:var(--text-muted); }

/* ---- sidebar ---- */
#sidebar {
  width: 290px; min-width:290px;
  background: var(--bg-panel);
  display: flex; flex-direction: column;
  border-right: 1px solid var(--border);
  transition: transform var(--transition);
  z-index: 50;
  position: relative;
}
#sidebar.collapsed { transform: translateX(-100%); min-width:0; width:0; }

#sidebar-top { flex:3; overflow-y:auto; border-bottom:1px solid var(--border); }
#sidebar-bottom { flex:2; overflow-y:auto; }

.panel-header {
  display:flex; justify-content:space-between; align-items:center;
  padding:14px 18px;
  font-family: var(--font-mono); font-size:10px; font-weight:600;
  text-transform:uppercase; letter-spacing:1.25px;
  color: var(--text-muted);
  background: rgba(0,0,0,0.25);
  border-bottom: 1px solid var(--border);
  position: sticky; top:0; z-index:2;
  backdrop-filter: blur(12px);
}

.panel-header button {
  background: transparent; color: var(--text-muted);
  border: 1px solid var(--border); width:30px; height:30px;
  border-radius: var(--radius-sm); cursor:pointer;
  font-size:18px; line-height:1;
  transition: all var(--transition);
  display:flex; align-items:center; justify-content:center;
}
.panel-header button:hover {
  border-color: var(--accent); color: var(--accent);
  box-shadow: 0 0 14px var(--accent-glow);
}

/* ---- session items ---- */
.session-item {
  padding:12px 18px; cursor:pointer;
  display:flex; align-items:center; gap:10px;
  border-bottom:1px solid rgba(30,42,58,0.5);
  transition: all var(--transition);
  position:relative;
}
.session-item::before {
  content:""; position:absolute; left:0; top:0; bottom:0; width:3px;
  background: var(--accent); transform:scaleY(0); transition:transform var(--transition);
  border-radius:0 2px 2px 0;
}
.session-item:hover { background:var(--bg-hover); }
.session-item.active { background:var(--bg-surface); }
.session-item.active::before { transform:scaleY(1); }
.session-name {
  font-family:var(--font-mono); font-size:11px; color:var(--accent);
  flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.session-msg { font-size:10px; color:var(--text-muted); white-space:nowrap; }
.btn-del {
  background:none; border:none; color:var(--text-muted);
  cursor:pointer; font-size:14px; padding:0 4px; opacity:0;
  transition: all var(--transition);
}
.session-item:hover .btn-del { opacity:0.6; }
.btn-del:hover { opacity:1!important; color:var(--red); }

/* ---- skill items ---- */
.skill-item {
  padding:10px 18px; cursor:pointer;
  display:flex; flex-direction:column; gap:3px;
  border-bottom:1px solid rgba(30,42,58,0.5);
  transition: all var(--transition);
}
.skill-item:hover { background:var(--bg-hover); }
.skill-item:hover .skill-name { color:var(--accent); }
.skill-name {
  font-family:var(--font-mono); font-size:11px; font-weight:600;
  color:var(--text-primary); transition:color var(--transition);
}
.skill-desc {
  font-size:10px; color:var(--text-muted); line-height:1.4;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
  overflow:hidden;
}

/* ---- empty states ---- */
.empty-hint {
  padding:32px 18px; color:var(--text-muted); font-size:11px; text-align:center;
  display:flex; flex-direction:column; align-items:center; gap:10px;
}
.empty-icon {
  width:40px; height:40px; border-radius:50%;
  border:1.5px dashed var(--border);
  display:flex; align-items:center; justify-content:center;
  font-size:16px; color:var(--text-muted);
  animation: float 3s ease-in-out infinite;
}
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }

/* ---- chat area ---- */
#chat-area { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; }

/* ---- toolbar ---- */
#chat-toolbar {
  display:flex; align-items:center; gap:12px;
  padding:10px 20px; border-bottom:1px solid var(--border);
  background:var(--bg-panel);
}
#btn-toggle-sidebar {
  background:none; border:1px solid var(--border); color:var(--text-muted);
  width:32px; height:32px; border-radius:var(--radius-sm); cursor:pointer;
  font-size:16px; display:none; align-items:center; justify-content:center;
  transition: all var(--transition);
}
#btn-toggle-sidebar:hover { border-color:var(--accent); color:var(--accent); }
@media (max-width:768px) { #btn-toggle-sidebar { display:flex; } }
#session-indicator {
  font-family:var(--font-mono); font-size:11px; color:var(--text-muted);
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
#session-indicator span { color:var(--accent); }

/* ---- messages ---- */
#chat-messages { flex:1; overflow-y:auto; padding:24px 20px; }
#chat-messages:empty::after {
  content:""; display:block; text-align:center; padding-top:80px;
}

.message {
  margin-bottom:20px; display:flex; flex-direction:column; gap:6px;
  animation: msgIn 0.35s cubic-bezier(0.4,0,0.2,1);
  max-width:85%;
}
.message.user { align-self:flex-end; margin-left:auto; }
.message.assistant { align-self:flex-start; }
@keyframes msgIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

.message .role {
  font-family:var(--font-mono); font-size:10px; font-weight:700;
  text-transform:uppercase; letter-spacing:0.8px;
}
.message.user .role { color:var(--accent); text-align:right; }
.message.assistant .role { color:var(--amber); }

.message .bubble {
  padding:12px 16px; border-radius:var(--radius);
  font-size:13.5px; line-height:1.65; white-space:pre-wrap; word-break:break-word;
  position:relative;
}
.message.user .bubble {
  background: linear-gradient(135deg, rgba(0,180,240,0.12), rgba(0,140,200,0.06));
  border: 1px solid rgba(0,180,240,0.2);
  border-radius: var(--radius) var(--radius) 4px var(--radius);
}
.message.assistant .bubble {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius) var(--radius) var(--radius) 4px;
}
.message.assistant .bubble:empty::after {
  content:""; display:inline-block; width:6px; height:14px;
  background:var(--accent); border-radius:3px;
  animation: blink 1s steps(1) infinite;
  vertical-align: text-bottom; margin-left:2px;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }

.message .bubble .typing-dots { display:inline-flex; gap:4px; padding:4px 0; }
.message .bubble .typing-dots span {
  width:5px; height:5px; border-radius:50%; background:var(--accent);
  animation: dotPulse 1.25s ease-in-out infinite;
}
.message .bubble .typing-dots span:nth-child(2) { animation-delay:0.15s; }
.message .bubble .typing-dots span:nth-child(3) { animation-delay:0.3s; }
@keyframes dotPulse { 0%,60%,100%{opacity:0.2;transform:scale(0.8)} 30%{opacity:1;transform:scale(1.15)} }

/* ---- input ---- */
.chat-input-area {
  display:flex; gap:10px; padding:14px 20px;
  border-top:1px solid var(--border); background:var(--bg-panel);
}
.chat-input-area textarea {
  flex:1; background:var(--bg-deep); color:var(--text-primary);
  border:1px solid var(--border); border-radius:var(--radius);
  padding:12px 16px; font-size:13.5px; font-family:var(--font-ui);
  resize:none; outline:none; line-height:1.5;
  transition:border-color var(--transition), box-shadow var(--transition);
}
.chat-input-area textarea:focus {
  border-color:var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
.chat-input-area textarea::placeholder { color:var(--text-muted); }
.chat-input-area button {
  background: transparent; color:var(--accent);
  border:1px solid var(--accent); width:46px; min-width:46px; border-radius:var(--radius);
  cursor:pointer; font-size:18px; transition:all var(--transition);
  display:flex; align-items:center; justify-content:center;
}
.chat-input-area button:hover {
  background: var(--accent); color: var(--bg-deep);
  box-shadow: 0 0 24px var(--accent-glow);
}
.chat-input-area button:disabled { opacity:0.35; cursor:default; box-shadow:none; }
.chat-input-area button:disabled:hover { background:transparent; color:var(--accent); }

/* ---- streaming indicator ---- */
.streaming-indicator {
  display:flex; align-items:center; gap:8px;
  padding:6px 0; font-family:var(--font-mono); font-size:10px;
  color:var(--accent); text-transform:uppercase; letter-spacing:1px;
}
.streaming-pulse {
  width:6px; height:6px; border-radius:50%; background:var(--accent);
  animation: pulseRing 1.2s ease-in-out infinite;
}
@keyframes pulseRing {
  0%{box-shadow:0 0 0 0 var(--accent-glow)} 70%{box-shadow:0 0 0 8px transparent} 100%{box-shadow:0 0 0 0 transparent}
}

/* ---- welcome screen ---- */
.welcome-screen {
  flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:16px; padding:40px; text-align:center; color:var(--text-muted);
}
.welcome-screen .logo {
  font-family:var(--font-mono); font-size:28px; font-weight:700;
  background: linear-gradient(135deg, var(--accent), var(--amber));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text;
}
.welcome-screen .hint { font-size:13px; max-width:320px; line-height:1.6; }

/* ---- modal ---- */
.modal-overlay {
  display:none; position:fixed; top:0; left:0; width:100%; height:100%;
  background:rgba(5,8,14,0.82); backdrop-filter:blur(4px);
  z-index:100; justify-content:center; align-items:center;
}
.modal-overlay.open { display:flex; }
.modal-panel {
  background:var(--bg-panel); border:1px solid var(--border);
  border-radius:14px; max-width:720px; max-height:80vh; width:92%;
  display:flex; flex-direction:column; overflow:hidden;
  box-shadow:0 24px 80px rgba(0,0,0,0.6), 0 0 40px var(--accent-glow);
  animation:modalIn 0.3s cubic-bezier(0.4,0,0.2,1);
}
@keyframes modalIn { from{opacity:0;transform:scale(0.95) translateY(20px)} to{opacity:1;transform:scale(1) translateY(0)} }
.modal-panel-header {
  display:flex; justify-content:space-between; align-items:center;
  padding:16px 22px; border-bottom:1px solid var(--border);
  font-family:var(--font-mono); font-size:13px; font-weight:600;
  color:var(--accent);
}
.modal-panel-header button {
  background:none; border:none; color:var(--text-muted);
  font-size:22px; cursor:pointer; transition:color var(--transition);
  width:32px; height:32px; display:flex; align-items:center; justify-content:center;
}
.modal-panel-header button:hover { color:var(--red); }
.modal-panel-body {
  flex:1; overflow-y:auto; padding:22px;
  font-family:var(--font-mono); font-size:12.5px; line-height:1.75;
  white-space:pre-wrap; color:var(--text-primary);
  background:var(--bg-deep);
}

/* ---- skeleton loader ---- */
.skeleton { background:linear-gradient(90deg, var(--bg-surface) 25%, var(--bg-hover) 50%, var(--bg-surface) 75%); background-size:200% 100%; animation:shimmer 1.6s ease-in-out infinite; border-radius:4px; }
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
.skel-line { height:12px; margin-bottom:10px; }
.skel-line:last-child { width:60%; }

/* ---- responsive ---- */
@media (max-width:768px) {
  #sidebar { position:fixed; left:0; top:0; bottom:0; z-index:60; }
  #sidebar.collapsed { transform:translateX(-100%); }
  .message { max-width:92%; }
}
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-top"></div>
  <div id="sidebar-bottom"></div>
</div>

<div id="chat-area">
  <div id="chat-toolbar">
    <button id="btn-toggle-sidebar" title="Toggle sidebar">&#9776;</button>
    <div id="session-indicator">No session selected</div>
  </div>
  <div id="chat-messages">
    <div class="welcome-screen">
      <div class="logo">&gt; claude _</div>
      <div class="hint">Create or select a session to start.  Messages stream token-by-token via SSE.</div>
    </div>
  </div>
  <div class="chat-input-area">
    <textarea id="chat-input" placeholder="Type a message... (Shift&#x2b06; + Enter to break)" rows="2" disabled></textarea>
    <button id="btn-send" title="Send" disabled>&#9654;</button>
  </div>
</div>

<script src="bundle.js"></script>
</body>
</html>
